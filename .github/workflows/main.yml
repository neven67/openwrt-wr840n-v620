name: Build WR840N v6.20

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk gcc-multilib \
        g++-multilib gettext git libncurses5-dev libssl-dev \
        python3 python3-distutils rsync unzip zlib1g-dev file wget

    - name: Update feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Custom config
      run: |
        cat >> .config << EOF
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt76x8=y
        CONFIG_TARGET_ramips_mt76x8_DEVICE_tplink_tl-wr840n-v6=y

        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_relayd=y
        CONFIG_PACKAGE_luci-proto-relay=y
        CONFIG_PACKAGE_wpad-mini=y

        CONFIG_PACKAGE_ppp=n
        CONFIG_PACKAGE_ipv6helper=n
        EOF

        make defconfig

    - name: Download sources
      run: make download -j8

    - name: Build firmware
      run: make -j$(nproc) || make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: WR840N-v620
        path: bin/targets/**/*
